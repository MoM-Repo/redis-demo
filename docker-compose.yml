services:

  redis-demo:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: redis-demo
    ports:
      - "${SERVER_PORT:-8080}:8080"
    env_file:
      - .env
    environment:
      - DB_HOST=postgres_db
      - DB_PORT=5432
      - DB_USER=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_NAME=${POSTGRES_DB}
      - REDIS_ADDRESS=redis:6379
      - SERVER_PORT=8080
    depends_on:
      postgres_db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend_network

  postgres_db:
    image: postgres:14-alpine
    container_name: postgres_db
    ports:
      - "6542:5432"
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -q -d ${POSTGRES_DB} -U ${POSTGRES_USER}"]
      timeout: 5s
      interval: 5s
      retries: 10
      start_period: 5s
    networks:
      - backend_network

  redis:
    image: redis:latest
    container_name: redis
    ports:
      - "6380:6379"
    restart: unless-stopped
    volumes:
      - redis-data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      retries: 3
      timeout: 5s
      start_period: 5s
    networks:
      - backend_network

volumes:
  redis-data:

networks:
  backend_network:
    driver: bridge